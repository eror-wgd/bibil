# Wrangler configuration for Cloudflare DoH Platform
name = "cloudflare-doh-platform"
main = "worker.js"
compatibility_date = "2026-06-28"

[vars]
# System-wide static configurations
JWT_SECRET = "CHANGE_ME_IN_PRODUCTION_JWT_SECRET_KEY" # Used for Admin panel JWT auth
ENVIRONMENT = "production"

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "doh-dns-db"
database_id = "0a7ae9a8-c5f1-42ea-8811-deec972213a4" # Replace with 'wrangler d1 create doh-dns-db' output

# Cloudflare KV Namespace Binding (for Cache & Rate Limiting)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "7afe187dd9f94370b9eedee94e3d0983" # Replace with 'wrangler kv:namespace create CACHE_KV' output

# Cloudflare Workers Assets Configuration (Serves the compiled React App)
[assets]
directory = "./dist"
